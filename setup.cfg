[flake8]
max-line-length = 120
exclude = 
    venv,
    __pycache__,
    mlruns,
    .git,
    build,
    dist,
    *.egg-info
ignore = 
    E501,
    W503,
    W504,
    E203,
    E302,
    E303,
    W291,
    W292,
    W293,
    E231,
    E261,
    E262,
    E265,
    E266,
    E128,
    E127,
    E126,
    E125,
    E124,
    E123,
    E121,
    E122,
    F401,
    E741,
    E402,
    W605