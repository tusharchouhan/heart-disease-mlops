name: Heart Disease MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8 Linting
        run: |
          flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503,E203

  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov
          pip install -e .

      - name: Download dataset
        run: python src/data/download_data.py

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: coverage.xml

  train:
    name: Model Training
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download dataset
        run: python src/data/download_data.py

      - name: Train models with MLflow
        run: python src/models/train_mlflow.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            models/
            screenshots/

  docker-build:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (to generate models)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate model files
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          python src/data/download_data.py
          python src/models/train_mlflow.py

      - name: Build Docker image
        run: docker build -t heart-disease-api:latest .

      - name: Run Docker container
        run: |
          docker run -d -p 8000:8000 --name test-container heart-disease-api:latest
          sleep 15

      - name: Test API health endpoint
        run: |
          curl -f http://localhost:8000/health
          echo "Health check passed!"

      - name: Test API prediction endpoint
        run: |
          curl -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":55,"sex":1,"cp":2,"trestbps":130,"chol":250,"fbs":0,"restecg":1,"thalach":150,"exang":0,"oldpeak":1.5,"slope":1,"ca":0,"thal":3}'
          echo "Prediction test passed!"

      - name: Test API docs endpoint
        run: |
          curl -f http://localhost:8000/docs
          echo "Docs endpoint passed!"

      - name: Show Docker logs
        if: always()
        run: docker logs test-container

      - name: Stop container
        if: always()
        run: |
          docker stop test-container
          docker rm test-container